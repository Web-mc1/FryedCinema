<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Supabase Test</title>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <style>
    body { font-family: sans-serif; max-width: 500px; margin: 40px auto; padding: 20px; background: #0f172a; color: #fff; }
    input, button { width: 100%; padding: 10px; margin-top: 10px; border-radius: 6px; border: 1px solid #334155; }
    input { background: #1e293b; color: #fff; }
    button { background: #3b82f6; color: white; font-weight: bold; cursor: pointer; border: none; }
    .card { background: #1e293b; padding: 15px; border-radius: 8px; margin-top: 10px; }
  </style>
</head>
<body>

  <h2>Create Profile</h2>
  <input type="text" id="username" placeholder="Username (e.g. alex)">
  <input type="text" id="displayName" placeholder="Display Name (e.g. Alex Smith)">
  <input type="text" id="bio" placeholder="Bio">
  <button onclick="createProfile()">Save Profile to Supabase</button>

  <h2>Live Profiles</h2>
  <div id="profiles-list">Loading...</div>

  <script>
    // Initialize Supabase with your live credentials
    const SUPABASE_URL = "https://umvacebilzgynalsuzhk.supabase.co";
    const SUPABASE_ANON_KEY = "sb_publishable_bDq8nyRIbp7c4nskplTg9g_JXEOXvnL";
    const supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

    // Fetch and display profiles from database
    async function loadProfiles() {
      const { data, error } = await supabase.from('profiles').select('*');
      const container = document.getElementById('profiles-list');
      
      if (error) {
        container.innerHTML = `<p style="color: #ef4444">Error: ${error.message}</p>`;
        return;
      }

      if (data.length === 0) {
        container.innerHTML = "<p>No profiles found yet. Make sure you ran the SQL setup script in Supabase!</p>";
        return;
      }

      container.innerHTML = data.map(p => `
        <div class="card">
          <h3>${p.display_name} (@${p.username})</h3>
          <p>${p.bio || 'No bio provided'}</p>
        </div>
      `).join('');
    }

    // Insert a new profile into the database
    async function createProfile() {
      const username = document.getElementById('username').value;
      const displayName = document.getElementById('displayName').value;
      const bio = document.getElementById('bio').value;

      if (!username) return alert('Please enter a username');

      const { data, error } = await supabase.from('profiles').insert([
        { username: username, display_name: displayName, bio: bio }
      ]);

      if (error) {
        alert('Error saving profile: ' + error.message);
      } else {
        alert('Profile created successfully!');
        loadProfiles();
      }
    }

    loadProfiles();
  </script>
</body>
</html>
